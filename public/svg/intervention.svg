<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6460"/>
      <stop offset="100%" stop-color="#4a4440"/>
    </linearGradient>
    <linearGradient id="vanBodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3e50"/>
      <stop offset="100%" stop-color="#1a2a38"/>
    </linearGradient>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dde8f0"/>
      <stop offset="100%" stop-color="#c8d8e8"/>
    </linearGradient>
    <linearGradient id="buildGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8c0b4"/>
      <stop offset="100%" stop-color="#b0a89c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-color="#1a2a38" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="800" height="540" fill="url(#skyGrad)"/>

  <!-- Background building -->
  <rect x="100" y="100" width="320" height="340" fill="url(#buildGrad)" opacity="0.7"/>
  <rect x="100" y="100" width="320" height="24" fill="#2d3e50" opacity="0.5"/>
  <!-- Building windows -->
  <rect x="130" y="145" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.5"/>
  <rect x="210" y="145" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.4"/>
  <rect x="290" y="145" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.5"/>
  <rect x="130" y="235" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.4"/>
  <rect x="210" y="235" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.5"/>
  <rect x="290" y="235" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.4"/>
  <rect x="130" y="325" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.5"/>
  <rect x="210" y="325" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.4"/>
  <rect x="290" y="325" width="55" height="65" rx="2" fill="#1a2a38" opacity="0.5"/>

  <!-- Road surface -->
  <rect x="0" y="420" width="800" height="120" fill="url(#roadGrad)" opacity="0.8"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="#8a8480" stroke-width="2" opacity="0.4"/>
  <!-- Road lane markings -->
  <rect x="0" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="120" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="240" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="360" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="480" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="600" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>
  <rect x="720" y="462" width="80" height="6" rx="2" fill="white" opacity="0.3"/>

  <!-- Footpath -->
  <rect x="0" y="400" width="800" height="22" fill="#c8c0b0" opacity="0.6"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#b0a890" stroke-width="1" opacity="0.4"/>

  <!-- === EDL VAN === -->
  <g transform="translate(420, 320)" filter="url(#shadow)">
    <!-- Van body -->
    <rect x="0" y="40" width="320" height="120" rx="8" fill="url(#vanBodyGrad)"/>
    <!-- Van cabin -->
    <rect x="220" y="10" width="100" height="82" rx="8" fill="#243040"/>
    <!-- Cabin window -->
    <rect x="234" y="18" width="72" height="46" rx="4" fill="#4a6880" opacity="0.6"/>
    <!-- Cabin glass shine -->
    <rect x="238" y="22" width="16" height="20" rx="2" fill="white" opacity="0.12"/>
    <!-- Van rear door line -->
    <line x1="60" y1="40" x2="60" y2="160" stroke="#b5a47a" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="100" x2="60" y2="100" stroke="#b5a47a" stroke-width="1" opacity="0.4"/>
    <!-- EDL logo text on van -->
    <rect x="70" y="70" width="130" height="36" rx="4" fill="#b5a47a" opacity="0.2"/>
    <text x="135" y="91" font-family="Arial, sans-serif" font-size="15" fill="#d4c9a8" text-anchor="middle" font-weight="bold" letter-spacing="1">LES CŒURS DE MADAGASCAR</text>

    <!-- Front bumper -->
    <rect x="280" y="130" width="44" height="30" rx="4" fill="#1a2a38" opacity="0.9"/>
    <!-- Headlight -->
    <rect x="296" y="120" width="24" height="16" rx="3" fill="#d4c9a8" opacity="0.7"/>
    <rect x="300" y="123" width="16" height="10" rx="2" fill="white" opacity="0.5"/>

    <!-- Wheels -->
    <circle cx="80" cy="168" r="36" fill="#1a2a38"/>
    <circle cx="80" cy="168" r="26" fill="#3d3830"/>
    <circle cx="80" cy="168" r="14" fill="#2d2820"/>
    <circle cx="80" cy="168" r="5" fill="#b5a47a" opacity="0.7"/>
    <!-- Wheel bolts -->
    <circle cx="80" cy="148" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="80" cy="188" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="60" cy="168" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="100" cy="168" r="3" fill="#b5a47a" opacity="0.5"/>

    <circle cx="250" cy="168" r="36" fill="#1a2a38"/>
    <circle cx="250" cy="168" r="26" fill="#3d3830"/>
    <circle cx="250" cy="168" r="14" fill="#2d2820"/>
    <circle cx="250" cy="168" r="5" fill="#b5a47a" opacity="0.7"/>
    <!-- Wheel bolts -->
    <circle cx="250" cy="148" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="250" cy="188" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="230" cy="168" r="3" fill="#b5a47a" opacity="0.5"/>
    <circle cx="270" cy="168" r="3" fill="#b5a47a" opacity="0.5"/>

    <!-- Roof rack -->
    <rect x="10" y="32" width="210" height="10" rx="3" fill="#b5a47a" opacity="0.7"/>
    <rect x="30" y="20" width="6" height="22" rx="2" fill="#8a7a5a" opacity="0.7"/>
    <rect x="80" y="20" width="6" height="22" rx="2" fill="#8a7a5a" opacity="0.7"/>
    <rect x="130" y="20" width="6" height="22" rx="2" fill="#8a7a5a" opacity="0.7"/>
    <rect x="180" y="20" width="6" height="22" rx="2" fill="#8a7a5a" opacity="0.7"/>
    <!-- Ladder on roof rack -->
    <rect x="36" y="14" width="150" height="8" rx="2" fill="#b5a47a" opacity="0.6"/>
    <rect x="36" y="4" width="150" height="8" rx="2" fill="#b5a47a" opacity="0.5"/>
    <!-- Ladder rungs -->
    <line x1="60" y1="4" x2="60" y2="22" stroke="#8a7a5a" stroke-width="2" opacity="0.6"/>
    <line x1="90" y1="4" x2="90" y2="22" stroke="#8a7a5a" stroke-width="2" opacity="0.6"/>
    <line x1="120" y1="4" x2="120" y2="22" stroke="#8a7a5a" stroke-width="2" opacity="0.6"/>
    <line x1="150" y1="4" x2="150" y2="22" stroke="#8a7a5a" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Workers standing -->
  <!-- Worker 1 -->
  <g transform="translate(390, 350)">
    <circle cx="18" cy="0" r="14" fill="#2d3e50"/>
    <rect x="6" y="-8" width="24" height="10" rx="4" fill="#b5a47a" opacity="0.9"/>
    <rect x="3" y="0" width="30" height="5" rx="2" fill="#8a7a5a" opacity="0.8"/>
    <rect x="4" y="14" width="28" height="46" rx="4" fill="#2d3e50" opacity="0.9"/>
    <rect x="8" y="24" width="20" height="3" rx="1" fill="#b5a47a" opacity="0.6"/>
    <rect x="8" y="42" width="20" height="3" rx="1" fill="#b5a47a" opacity="0.6"/>
    <rect x="6" y="60" width="12" height="36" rx="3" fill="#1a2a38" opacity="0.9"/>
    <rect x="20" y="60" width="12" height="36" rx="3" fill="#1a2a38" opacity="0.9"/>
    <rect x="2" y="90" width="18" height="10" rx="3" fill="#0f1a24" opacity="0.95"/>
    <rect x="18" y="90" width="18" height="10" rx="3" fill="#0f1a24" opacity="0.95"/>
  </g>

  <!-- Worker 2 -->
  <g transform="translate(356, 360)">
    <circle cx="18" cy="0" r="14" fill="#2d3e50"/>
    <rect x="6" y="-8" width="24" height="10" rx="4" fill="#d4c9a8" opacity="0.9"/>
    <rect x="3" y="0" width="30" height="5" rx="2" fill="#c4b898" opacity="0.8"/>
    <rect x="4" y="14" width="28" height="46" rx="4" fill="#2d3e50" opacity="0.9"/>
    <rect x="8" y="24" width="20" height="3" rx="1" fill="#b5a47a" opacity="0.6"/>
    <rect x="8" y="42" width="20" height="3" rx="1" fill="#b5a47a" opacity="0.6"/>
    <rect x="6" y="60" width="12" height="36" rx="3" fill="#1a2a38" opacity="0.9"/>
    <rect x="20" y="60" width="12" height="36" rx="3" fill="#1a2a38" opacity="0.9"/>
    <rect x="2" y="90" width="18" height="10" rx="3" fill="#0f1a24" opacity="0.95"/>
    <rect x="18" y="90" width="18" height="10" rx="3" fill="#0f1a24" opacity="0.95"/>
  </g>
</svg>
