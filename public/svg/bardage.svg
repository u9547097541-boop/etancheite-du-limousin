<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#ece8e0"/>
    </linearGradient>
    <linearGradient id="panel1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b5a47a"/>
      <stop offset="100%" stop-color="#c8b888"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a89060"/>
      <stop offset="100%" stop-color="#b8a070"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3e50"/>
      <stop offset="100%" stop-color="#3d5166"/>
    </linearGradient>
    <linearGradient id="navyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a38"/>
      <stop offset="100%" stop-color="#2d3e50"/>
    </linearGradient>
  </defs>

  <rect width="800" height="540" fill="url(#bg)"/>

  <!-- Building facade — perspective view -->
  <!-- Main facade wall -->
  <rect x="80" y="60" width="500" height="440" fill="url(#wall)" opacity="0.75"/>

  <!-- Top facade band -->
  <rect x="80" y="60" width="500" height="30" fill="url(#navyTop)" opacity="0.9"/>

  <!-- Bardage panels — vertical siding — column by column -->
  <!-- Each panel: a vertical rectangle with slight color variation and join shadow -->

  <!-- Panel Group A — 8 panels wide x 7 rows tall -->
  <!-- Columns -->
  <rect x="90"  y="95" width="52" height="390" fill="url(#panel1)" opacity="0.88"/>
  <rect x="90"  y="95" width="4"  height="390" fill="#1a2a38" opacity="0.25"/>

  <rect x="148" y="95" width="52" height="390" fill="url(#panel2)" opacity="0.85"/>
  <rect x="148" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.2"/>

  <rect x="206" y="95" width="52" height="390" fill="url(#panel1)" opacity="0.88"/>
  <rect x="206" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.22"/>

  <rect x="264" y="95" width="52" height="390" fill="url(#panel2)" opacity="0.85"/>
  <rect x="264" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.2"/>

  <rect x="322" y="95" width="52" height="390" fill="url(#panel1)" opacity="0.88"/>
  <rect x="322" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.22"/>

  <rect x="380" y="95" width="52" height="390" fill="url(#panel2)" opacity="0.85"/>
  <rect x="380" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.2"/>

  <rect x="438" y="95" width="52" height="390" fill="url(#panel1)" opacity="0.88"/>
  <rect x="438" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.22"/>

  <rect x="496" y="95" width="52" height="390" fill="url(#panel2)" opacity="0.85"/>
  <rect x="496" y="95" width="4"  height="390" fill="#1a2a38" opacity="0.2"/>

  <!-- Horizontal joint lines across all panels -->
  <line x1="90" y1="150" x2="548" y2="150" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="205" x2="548" y2="205" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="260" x2="548" y2="260" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="315" x2="548" y2="315" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="370" x2="548" y2="370" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>
  <line x1="90" y1="425" x2="548" y2="425" stroke="#1a2a38" stroke-width="1.5" opacity="0.25"/>

  <!-- Window cutouts in facade -->
  <!-- Window 1 -->
  <rect x="118" y="170" width="90" height="110" rx="2" fill="#1a2a38" opacity="0.9"/>
  <rect x="122" y="174" width="82" height="102" rx="1" fill="#2a3f54" opacity="0.8"/>
  <line x1="163" y1="174" x2="163" y2="276" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <line x1="122" y1="225" x2="204" y2="225" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <!-- Reflection -->
  <rect x="127" y="178" width="16" height="40" rx="1" fill="#6a8faa" opacity="0.15"/>

  <!-- Window 2 -->
  <rect x="234" y="170" width="90" height="110" rx="2" fill="#1a2a38" opacity="0.9"/>
  <rect x="238" y="174" width="82" height="102" rx="1" fill="#2a3f54" opacity="0.8"/>
  <line x1="279" y1="174" x2="279" y2="276" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <line x1="238" y1="225" x2="320" y2="225" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <rect x="243" y="178" width="16" height="40" rx="1" fill="#6a8faa" opacity="0.15"/>

  <!-- Window 3 -->
  <rect x="352" y="170" width="90" height="110" rx="2" fill="#1a2a38" opacity="0.9"/>
  <rect x="356" y="174" width="82" height="102" rx="1" fill="#2a3f54" opacity="0.8"/>
  <line x1="397" y1="174" x2="397" y2="276" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <line x1="356" y1="225" x2="438" y2="225" stroke="#4d6880" stroke-width="1" opacity="0.5"/>
  <rect x="361" y="178" width="16" height="40" rx="1" fill="#6a8faa" opacity="0.15"/>

  <!-- Panel being installed — slightly offset/angled on right side -->
  <g transform="translate(590, 80) rotate(2)">
    <rect x="0" y="0" width="54" height="380" fill="#d4c9a8" opacity="0.9"/>
    <!-- Panel join shadow -->
    <rect x="0" y="0" width="5" height="380" fill="#b5a47a" opacity="0.5"/>
    <!-- Horizontal joint lines on new panel -->
    <line x1="0" y1="55" x2="54" y2="55" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="110" x2="54" y2="110" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="165" x2="54" y2="165" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="220" x2="54" y2="220" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="275" x2="54" y2="275" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="330" x2="54" y2="330" stroke="#a89060" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Worker on scaffolding -->
  <g transform="translate(630, 260)">
    <!-- Scaffold platform -->
    <rect x="-30" y="100" width="120" height="10" rx="2" fill="#8a7a5a" opacity="0.8"/>
    <rect x="-25" y="110" width="6" height="60" rx="2" fill="#8a7a5a" opacity="0.7"/>
    <rect x="82" y="110" width="6" height="60" rx="2" fill="#8a7a5a" opacity="0.7"/>

    <!-- Body -->
    <rect x="20" y="30" width="32" height="58" rx="5" fill="#2d3e50" opacity="0.9"/>
    <!-- Hi-vis vest -->
    <rect x="24" y="42" width="24" height="4" rx="1" fill="#b5a47a" opacity="0.7"/>
    <rect x="24" y="62" width="24" height="4" rx="1" fill="#b5a47a" opacity="0.7"/>
    <!-- Head -->
    <circle cx="36" cy="18" r="15" fill="#2d3e50"/>
    <!-- Helmet -->
    <rect x="21" y="8" width="30" height="10" rx="4" fill="#b5a47a" opacity="0.9"/>
    <rect x="18" y="16" width="36" height="5" rx="2" fill="#8a7a5a" opacity="0.8"/>
    <!-- Arms -->
    <rect x="-10" y="34" width="34" height="12" rx="5" fill="#2d3e50" opacity="0.85"/>
    <rect x="48" y="34" width="26" height="12" rx="5" fill="#2d3e50" opacity="0.85"/>
    <!-- Legs -->
    <rect x="22" y="88" width="14" height="44" rx="4" fill="#1a2a38" opacity="0.9"/>
    <rect x="38" y="88" width="14" height="44" rx="4" fill="#1a2a38" opacity="0.9"/>
    <!-- Boots -->
    <rect x="16" y="126" width="22" height="12" rx="3" fill="#0f1a24" opacity="0.95"/>
    <rect x="34" y="126" width="22" height="12" rx="3" fill="#0f1a24" opacity="0.95"/>

    <!-- Tool — rivet gun -->
    <rect x="-12" y="38" width="24" height="8" rx="3" fill="#8a7a5a" opacity="0.85"/>
    <rect x="-18" y="36" width="8" height="12" rx="2" fill="#6a5a3a" opacity="0.8"/>
  </g>

  <!-- Ground line -->
  <rect x="0" y="490" width="800" height="50" fill="#c8c0b0" opacity="0.4"/>
  <line x1="0" y1="490" x2="800" y2="490" stroke="#a89060" stroke-width="1" opacity="0.3"/>
</svg>
