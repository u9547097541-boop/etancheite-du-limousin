<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a38"/>
      <stop offset="100%" stop-color="#2d3e50"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d5166"/>
      <stop offset="100%" stop-color="#2d3e50"/>
    </linearGradient>
    <linearGradient id="roofGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5a47a"/>
      <stop offset="100%" stop-color="#8a7a5a"/>
    </linearGradient>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4dc"/>
      <stop offset="100%" stop-color="#d4d0c8"/>
    </linearGradient>
    <filter id="blur1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#sky)"/>

  <!-- Atmospheric glow -->
  <ellipse cx="900" cy="120" rx="300" ry="150" fill="#b5a47a" opacity="0.06" filter="url(#blur1)"/>
  <ellipse cx="200" cy="500" rx="250" ry="120" fill="#3d5166" opacity="0.3" filter="url(#blur1)"/>

  <!-- Ground -->
  <rect x="0" y="540" width="1200" height="140" fill="#1a2a38"/>
  <rect x="0" y="540" width="1200" height="4" fill="#b5a47a" opacity="0.2"/>

  <!-- Building 1 — large industrial -->
  <rect x="80" y="220" width="380" height="320" fill="url(#wallGrad)" opacity="0.12"/>
  <rect x="80" y="220" width="380" height="320" fill="#2d3e50" opacity="0.6"/>
  <!-- Roof flat -->
  <rect x="75" y="210" width="390" height="18" fill="url(#roofGrad)" opacity="0.9"/>
  <!-- Roof texture lines -->
  <rect x="80" y="213" width="380" height="2" fill="#1a2a38" opacity="0.3"/>
  <rect x="80" y="217" width="380" height="1" fill="#d4c9a8" opacity="0.4"/>
  <!-- Windows row 1 -->
  <rect x="110" y="250" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.15"/>
  <rect x="210" y="250" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.15"/>
  <rect x="310" y="250" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.15"/>
  <!-- Windows row 2 -->
  <rect x="110" y="330" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.10"/>
  <rect x="210" y="330" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.10"/>
  <rect x="310" y="330" width="70" height="50" rx="2" fill="#b5a47a" opacity="0.10"/>
  <!-- Door -->
  <rect x="210" y="430" width="50" height="90" rx="2" fill="#1a2a38" opacity="0.8"/>

  <!-- Building 2 — modern flat -->
  <rect x="520" y="160" width="480" height="380" fill="#243548" opacity="0.9"/>
  <!-- Roof membrane visible -->
  <rect x="515" y="148" width="490" height="20" fill="url(#roofGrad)"/>
  <rect x="520" y="152" width="480" height="3" fill="#1a2a38" opacity="0.4"/>
  <!-- Roof details — membrane seams -->
  <line x1="600" y1="148" x2="600" y2="168" stroke="#1a2a38" stroke-width="1" opacity="0.5"/>
  <line x1="700" y1="148" x2="700" y2="168" stroke="#1a2a38" stroke-width="1" opacity="0.5"/>
  <line x1="800" y1="148" x2="800" y2="168" stroke="#1a2a38" stroke-width="1" opacity="0.5"/>
  <line x1="900" y1="148" x2="900" y2="168" stroke="#1a2a38" stroke-width="1" opacity="0.5"/>
  <!-- Windows grid -->
  <rect x="540" y="190" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.12"/>
  <rect x="640" y="190" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.18"/>
  <rect x="740" y="190" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.12"/>
  <rect x="840" y="190" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.12"/>
  <rect x="940" y="190" width="50" height="60" rx="1" fill="#b5a47a" opacity="0.08"/>
  <rect x="540" y="270" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.08"/>
  <rect x="640" y="270" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.12"/>
  <rect x="740" y="270" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.08"/>
  <rect x="840" y="270" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.08"/>
  <rect x="540" y="350" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.06"/>
  <rect x="640" y="350" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.10"/>
  <rect x="740" y="350" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.06"/>
  <rect x="840" y="350" width="80" height="60" rx="1" fill="#b5a47a" opacity="0.06"/>

  <!-- Worker silhouette on roof -->
  <g opacity="0.7">
    <!-- Body -->
    <rect x="755" y="118" width="8" height="22" rx="3" fill="#d4c9a8"/>
    <!-- Head -->
    <circle cx="759" cy="113" r="6" fill="#d4c9a8"/>
    <!-- Helmet -->
    <ellipse cx="759" cy="110" rx="7" ry="4" fill="#b5a47a"/>
    <!-- Arm extending -->
    <line x1="755" y1="124" x2="745" y2="130" stroke="#d4c9a8" stroke-width="3" stroke-linecap="round"/>
    <!-- Tool -->
    <rect x="736" y="128" width="12" height="4" rx="1" fill="#b5a47a"/>
  </g>

  <!-- Scaffold/ladder hint -->
  <rect x="460" y="300" width="6" height="240" fill="#b5a47a" opacity="0.25"/>
  <rect x="480" y="300" width="6" height="240" fill="#b5a47a" opacity="0.25"/>
  <rect x="460" y="320" width="26" height="3" fill="#b5a47a" opacity="0.2"/>
  <rect x="460" y="360" width="26" height="3" fill="#b5a47a" opacity="0.2"/>
  <rect x="460" y="400" width="26" height="3" fill="#b5a47a" opacity="0.2"/>
  <rect x="460" y="440" width="26" height="3" fill="#b5a47a" opacity="0.2"/>
  <rect x="460" y="480" width="26" height="3" fill="#b5a47a" opacity="0.2"/>

  <!-- Horizon glow -->
  <rect x="0" y="535" width="1200" height="10" fill="url(#roofGrad)" opacity="0.08"/>

  <!-- Stars/particles -->
  <circle cx="150" cy="60" r="1.5" fill="#b5a47a" opacity="0.4"/>
  <circle cx="400" cy="40" r="1" fill="#d4c9a8" opacity="0.3"/>
  <circle cx="650" cy="80" r="1.5" fill="#b5a47a" opacity="0.3"/>
  <circle cx="950" cy="50" r="1" fill="#d4c9a8" opacity="0.4"/>
  <circle cx="1100" cy="90" r="1.5" fill="#b5a47a" opacity="0.3"/>
  <circle cx="300" cy="110" r="1" fill="#d4c9a8" opacity="0.25"/>
  <circle cx="1050" cy="130" r="1" fill="#d4c9a8" opacity="0.25"/>
</svg>
