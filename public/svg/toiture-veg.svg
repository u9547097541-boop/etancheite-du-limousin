<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f0"/>
      <stop offset="100%" stop-color="#d4ede8"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6b5010"/>
    </linearGradient>
    <linearGradient id="drainage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5a47a"/>
      <stop offset="100%" stop-color="#8a7a5a"/>
    </linearGradient>
    <linearGradient id="membrane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3e50"/>
      <stop offset="100%" stop-color="#1a2a38"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="540" fill="url(#sky)"/>

  <!-- === CROSS-SECTION VIEW === -->
  <!-- Outer frame / parapet -->
  <rect x="60" y="60" width="680" height="420" rx="4" fill="white" opacity="0.6"/>
  <rect x="60" y="60" width="680" height="420" rx="4" fill="none" stroke="#b5a47a" stroke-width="2" opacity="0.5"/>

  <!-- Section label band at top -->
  <rect x="60" y="60" width="680" height="36" rx="4" fill="#2d3e50" opacity="0.85"/>
  <text x="400" y="83" font-family="Georgia, serif" font-size="13" fill="#d4c9a8" text-anchor="middle" letter-spacing="2">COUPE STRATIGRAPHIQUE — TOITURE VÉGÉTALISÉE</text>

  <!-- LAYER 5 — Vegetation -->
  <!-- Soil layer -->
  <rect x="80" y="96" width="640" height="80" fill="url(#soil)" opacity="0.8"/>

  <!-- Grass / plants -->
  <!-- Dense grass tufts -->
  <g opacity="0.9">
    <!-- Tall grasses -->
    <path d="M 100 176 Q 98 148 102 130" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 108 176 Q 112 142 109 122" stroke="#3d6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 118 176 Q 115 152 120 135" stroke="#4a7c59" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M 160 176 Q 158 146 163 128" stroke="#3d6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 170 176 Q 174 140 171 120" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 220 176 Q 218 145 224 127" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 232 176 Q 228 148 233 130" stroke="#3d6b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M 290 176 Q 288 143 294 125" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 300 176 Q 304 138 301 118" stroke="#3d6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 360 176 Q 357 141 364 122" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 373 176 Q 370 147 375 130" stroke="#5a8c68" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M 430 176 Q 426 143 432 124" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 442 176 Q 446 140 443 120" stroke="#3d6b4a" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 510 176 Q 507 143 514 124" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 522 176 Q 518 146 524 128" stroke="#3d6b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M 580 176 Q 577 142 584 123" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 592 176 Q 596 139 593 119" stroke="#5a8c68" stroke-width="3" fill="none" stroke-linecap="round"/>

    <path d="M 650 176 Q 647 143 653 125" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 662 176 Q 658 147 664 130" stroke="#3d6b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <path d="M 710 176 Q 707 142 714 124" stroke="#4a7c59" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Label VÉGÉTATION -->
  <rect x="82" y="126" width="106" height="22" rx="3" fill="#2d3e50" opacity="0.7"/>
  <text x="135" y="141" font-family="Arial, sans-serif" font-size="11" fill="#d4c9a8" text-anchor="middle">VÉGÉTATION</text>

  <!-- LAYER 4 — Drainage / Gravel -->
  <rect x="80" y="176" width="640" height="52" fill="url(#drainage)" opacity="0.6"/>
  <!-- Gravel texture -->
  <circle cx="120" cy="202" r="6" fill="#c8b880" opacity="0.7"/><circle cx="145" cy="196" r="5" fill="#a89060" opacity="0.7"/>
  <circle cx="170" cy="205" r="7" fill="#b8a870" opacity="0.6"/><circle cx="198" cy="198" r="5" fill="#c8b880" opacity="0.7"/>
  <circle cx="224" cy="204" r="6" fill="#a89060" opacity="0.6"/><circle cx="250" cy="196" r="5" fill="#b8a870" opacity="0.7"/>
  <circle cx="278" cy="206" r="7" fill="#c8b880" opacity="0.6"/><circle cx="305" cy="200" r="5" fill="#a89060" opacity="0.7"/>
  <circle cx="330" cy="204" r="6" fill="#b8a870" opacity="0.6"/><circle cx="358" cy="197" r="5" fill="#c8b880" opacity="0.7"/>
  <circle cx="385" cy="205" r="7" fill="#a89060" opacity="0.6"/><circle cx="412" cy="200" r="5" fill="#b8a870" opacity="0.7"/>
  <circle cx="440" cy="202" r="6" fill="#c8b880" opacity="0.7"/><circle cx="466" cy="196" r="5" fill="#a89060" opacity="0.6"/>
  <circle cx="493" cy="205" r="6" fill="#b8a870" opacity="0.7"/><circle cx="520" cy="199" r="5" fill="#c8b880" opacity="0.6"/>
  <circle cx="547" cy="204" r="7" fill="#a89060" opacity="0.7"/><circle cx="575" cy="198" r="5" fill="#b8a870" opacity="0.6"/>
  <circle cx="602" cy="205" r="6" fill="#c8b880" opacity="0.7"/><circle cx="628" cy="200" r="5" fill="#a89060" opacity="0.6"/>
  <circle cx="655" cy="202" r="7" fill="#b8a870" opacity="0.7"/><circle cx="682" cy="197" r="5" fill="#c8b880" opacity="0.6"/>
  <circle cx="706" cy="205" r="6" fill="#a89060" opacity="0.7"/>
  <!-- Label DRAINAGE -->
  <rect x="82" y="187" width="88" height="22" rx="3" fill="#1a2a38" opacity="0.7"/>
  <text x="126" y="202" font-family="Arial, sans-serif" font-size="11" fill="#d4c9a8" text-anchor="middle">DRAINAGE</text>

  <!-- LAYER 3 — Waterproofing membrane -->
  <rect x="80" y="228" width="640" height="28" fill="url(#membrane)" opacity="0.9"/>
  <!-- Seam lines -->
  <line x1="240" y1="228" x2="240" y2="256" stroke="#b5a47a" stroke-width="1.5" opacity="0.4"/>
  <line x1="400" y1="228" x2="400" y2="256" stroke="#b5a47a" stroke-width="1.5" opacity="0.4"/>
  <line x1="560" y1="228" x2="560" y2="256" stroke="#b5a47a" stroke-width="1.5" opacity="0.4"/>
  <!-- Label MEMBRANE -->
  <rect x="82" y="233" width="130" height="20" rx="3" fill="#b5a47a" opacity="0.85"/>
  <text x="147" y="247" font-family="Arial, sans-serif" font-size="10" fill="#1a2a38" text-anchor="middle" font-weight="bold">MEMBRANE ÉTANCHE</text>

  <!-- LAYER 2 — Insulation -->
  <rect x="80" y="256" width="640" height="55" fill="#e8e0d0" opacity="0.9"/>
  <!-- Foam texture dots -->
  <circle cx="110" cy="278" r="3" fill="#d4c9a8" opacity="0.6"/>
  <circle cx="135" cy="272" r="2.5" fill="#c4b898" opacity="0.5"/>
  <circle cx="160" cy="280" r="3" fill="#d4c9a8" opacity="0.6"/>
  <circle cx="185" cy="271" r="2.5" fill="#c4b898" opacity="0.5"/>
  <circle cx="210" cy="278" r="3" fill="#d4c9a8" opacity="0.6"/>
  <circle cx="240" cy="272" r="2.5" fill="#c4b898" opacity="0.5"/>
  <!-- Label ISOLANT -->
  <rect x="82" y="263" width="80" height="20" rx="3" fill="#8a7a5a" opacity="0.75"/>
  <text x="122" y="277" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">ISOLANT</text>

  <!-- LAYER 1 — Structural slab -->
  <rect x="80" y="311" width="640" height="80" fill="#9a9490" opacity="0.7"/>
  <!-- Reinforcement bars -->
  <line x1="80" y1="340" x2="720" y2="340" stroke="#7a7070" stroke-width="3" opacity="0.5"/>
  <line x1="80" y1="365" x2="720" y2="365" stroke="#7a7070" stroke-width="3" opacity="0.5"/>
  <line x1="160" y1="311" x2="160" y2="391" stroke="#7a7070" stroke-width="2" opacity="0.3"/>
  <line x1="280" y1="311" x2="280" y2="391" stroke="#7a7070" stroke-width="2" opacity="0.3"/>
  <line x1="400" y1="311" x2="400" y2="391" stroke="#7a7070" stroke-width="2" opacity="0.3"/>
  <line x1="520" y1="311" x2="520" y2="391" stroke="#7a7070" stroke-width="2" opacity="0.3"/>
  <line x1="640" y1="311" x2="640" y2="391" stroke="#7a7070" stroke-width="2" opacity="0.3"/>
  <!-- Label DALLE BÉTON -->
  <rect x="82" y="340" width="100" height="20" rx="3" fill="#1a2a38" opacity="0.7"/>
  <text x="132" y="354" font-family="Arial, sans-serif" font-size="11" fill="#d4c9a8" text-anchor="middle">DALLE BÉTON</text>

  <!-- Dimension arrows on right side -->
  <line x1="735" y1="96" x2="735" y2="391" stroke="#b5a47a" stroke-width="1.5" opacity="0.5"/>
  <line x1="728" y1="96" x2="742" y2="96" stroke="#b5a47a" stroke-width="1.5" opacity="0.5"/>
  <line x1="728" y1="391" x2="742" y2="391" stroke="#b5a47a" stroke-width="1.5" opacity="0.5"/>
  <text x="755" y="248" font-family="Arial, sans-serif" font-size="10" fill="#8a7a5a" text-anchor="middle" transform="rotate(90, 755, 248)">TOITURE VÉGÉTALISÉE</text>
</svg>
