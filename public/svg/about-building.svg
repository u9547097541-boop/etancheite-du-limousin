<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" fill="none">
  <defs>
    <linearGradient id="navySky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a38"/>
      <stop offset="40%" stop-color="#2d3e50"/>
      <stop offset="100%" stop-color="#3d5166"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3e50"/>
      <stop offset="100%" stop-color="#1a2a38"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d5166"/>
      <stop offset="100%" stop-color="#2d3e50"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b5a47a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#b5a47a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="800" height="540" fill="url(#navySky)"/>

  <!-- Stars -->
  <circle cx="60" cy="40" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="140" cy="25" r="1" fill="white" opacity="0.5"/>
  <circle cx="220" cy="55" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="310" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="470" cy="45" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="560" cy="20" r="1" fill="white" opacity="0.5"/>
  <circle cx="650" cy="50" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="740" cy="35" r="1" fill="white" opacity="0.5"/>
  <circle cx="770" cy="70" r="1.2" fill="white" opacity="0.6"/>

  <!-- Background building L -->
  <rect x="0" y="200" width="200" height="340" fill="url(#bldg2)" opacity="0.6"/>
  <rect x="0" y="200" width="200" height="20" fill="#1a2a38" opacity="0.8"/>
  <!-- Windows B1 -->
  <rect x="20" y="240" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="70" y="240" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="120" y="240" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.2"/>
  <rect x="20" y="300" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="70" y="300" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.2"/>
  <rect x="120" y="300" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="20" y="360" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.15"/>
  <rect x="70" y="360" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="120" y="360" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.2"/>

  <!-- Background building R -->
  <rect x="600" y="170" width="200" height="370" fill="url(#bldg2)" opacity="0.5"/>
  <rect x="600" y="170" width="200" height="20" fill="#1a2a38" opacity="0.8"/>
  <rect x="620" y="210" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="670" y="210" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.2"/>
  <rect x="720" y="210" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="620" y="270" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.2"/>
  <rect x="670" y="270" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="720" y="270" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.2"/>
  <rect x="620" y="330" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>
  <rect x="670" y="330" width="30" height="36" rx="2" fill="#d4c9a8" opacity="0.15"/>
  <rect x="720" y="330" width="30" height="36" rx="2" fill="#4a7a9a" opacity="0.3"/>

  <!-- Main central building — LARGE -->
  <rect x="190" y="120" width="420" height="420" fill="url(#bldg1)" opacity="0.85"/>
  <rect x="190" y="120" width="420" height="22" fill="#1a2a38" opacity="0.95"/>

  <!-- Main building windows — grid -->
  <!-- Row 1 -->
  <rect x="220" y="162" width="58" height="68" rx="2" fill="#2a4060" opacity="0.7"/>
  <rect x="298" y="162" width="58" height="68" rx="2" fill="#3a5570" opacity="0.5"/>
  <rect x="376" y="162" width="58" height="68" rx="2" fill="#2a4060" opacity="0.7"/>
  <rect x="454" y="162" width="58" height="68" rx="2" fill="#3a5570" opacity="0.5"/>
  <rect x="532" y="162" width="58" height="68" rx="2" fill="#2a4060" opacity="0.6"/>
  <!-- Row 2 -->
  <rect x="220" y="250" width="58" height="68" rx="2" fill="#3a5570" opacity="0.5"/>
  <rect x="298" y="250" width="58" height="68" rx="2" fill="#2a4060" opacity="0.7"/>
  <rect x="376" y="250" width="58" height="68" rx="2" fill="#d4c9a8" opacity="0.2"/>
  <rect x="454" y="250" width="58" height="68" rx="2" fill="#2a4060" opacity="0.7"/>
  <rect x="532" y="250" width="58" height="68" rx="2" fill="#3a5570" opacity="0.5"/>
  <!-- Row 3 -->
  <rect x="220" y="338" width="58" height="68" rx="2" fill="#2a4060" opacity="0.6"/>
  <rect x="298" y="338" width="58" height="68" rx="2" fill="#3a5570" opacity="0.5"/>
  <rect x="376" y="338" width="58" height="68" rx="2" fill="#2a4060" opacity="0.7"/>
  <rect x="454" y="338" width="58" height="68" rx="2" fill="#d4c9a8" opacity="0.15"/>
  <rect x="532" y="338" width="58" height="68" rx="2" fill="#2a4060" opacity="0.6"/>

  <!-- ROOFTOP — flat with membrane work in progress -->
  <!-- Glow emanating from rooftop work -->
  <ellipse cx="400" cy="132" rx="160" ry="40" fill="url(#glow1)"/>

  <!-- Rooftop surface / parapet -->
  <rect x="188" y="118" width="424" height="16" rx="3" fill="#b5a47a" opacity="0.7"/>

  <!-- Rooftop — dark membrane surface -->
  <rect x="192" y="72" width="416" height="48" rx="2" fill="#1a2a38" opacity="0.95"/>
  <!-- Membrane seam lines -->
  <line x1="192" y1="96" x2="608" y2="96" stroke="#b5a47a" stroke-width="1.5" opacity="0.35"/>
  <line x1="330" y1="72" x2="330" y2="120" stroke="#b5a47a" stroke-width="1" opacity="0.25"/>
  <line x1="470" y1="72" x2="470" y2="120" stroke="#b5a47a" stroke-width="1" opacity="0.25"/>

  <!-- Worker on rooftop -->
  <g transform="translate(370, 48)">
    <!-- Body -->
    <rect x="8" y="16" width="22" height="34" rx="3" fill="#2d3e50" opacity="0.95"/>
    <!-- Hi-vis vest -->
    <rect x="12" y="22" width="14" height="3" rx="1" fill="#b5a47a" opacity="0.7"/>
    <rect x="12" y="36" width="14" height="3" rx="1" fill="#b5a47a" opacity="0.7"/>
    <!-- Head -->
    <circle cx="19" cy="9" r="10" fill="#2d3e50"/>
    <!-- Helmet -->
    <rect x="9" y="2" width="20" height="8" rx="3" fill="#b5a47a" opacity="0.9"/>
    <rect x="7" y="8" width="24" height="4" rx="2" fill="#8a7a5a" opacity="0.8"/>
    <!-- Arms + tool motion -->
    <rect x="-8" y="20" width="20" height="10" rx="4" fill="#2d3e50" opacity="0.85"/>
    <rect x="26" y="22" width="18" height="10" rx="4" fill="#2d3e50" opacity="0.85"/>
    <!-- Legs -->
    <rect x="9" y="50" width="9" height="26" rx="3" fill="#1a2a38" opacity="0.9"/>
    <rect x="20" y="50" width="9" height="26" rx="3" fill="#1a2a38" opacity="0.9"/>
    <!-- Boots -->
    <rect x="5" y="72" width="14" height="8" rx="2" fill="#0f1a24"/>
    <rect x="18" y="72" width="14" height="8" rx="2" fill="#0f1a24"/>
  </g>

  <!-- Scaffold on left side -->
  <rect x="185" y="80" width="8" height="460" fill="#b5a47a" opacity="0.4"/>
  <rect x="185" y="180" width="30" height="6" rx="2" fill="#8a7a5a" opacity="0.5"/>
  <rect x="185" y="260" width="30" height="6" rx="2" fill="#8a7a5a" opacity="0.5"/>
  <rect x="185" y="340" width="30" height="6" rx="2" fill="#8a7a5a" opacity="0.5"/>
  <rect x="185" y="420" width="30" height="6" rx="2" fill="#8a7a5a" opacity="0.5"/>

  <!-- Ground line -->
  <rect x="0" y="500" width="800" height="40" fill="#1a2a38" opacity="0.3"/>
  <line x1="0" y1="500" x2="800" y2="500" stroke="#b5a47a" stroke-width="1" opacity="0.25"/>
</svg>
